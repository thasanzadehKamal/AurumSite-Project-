<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" refer></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="test.css" />
    <script src="test.js" async></script>
</head>

<body>
  <button id="basketBtn" class="cart-button">
    Səbət
    <span class="cart-count">0</span>
  </button>
  <nav>
    <a href="#" class="logo">Aurum</a>

    <div class="nav-middle">
      <ul>
        <li><a href="#">Collection</a></li>
        <li><a href="#">Heritage</a></li>
        <li><a href="#">Craft</a></li>
        <li><a href="#">Journal</a></li>
      </ul>
      <div id="Search"  class="nav-search">
        <input type="search" placeholder="Axtar..." />
        <i class="fas fa-search"></i>
      </div>
    </div>

    <div class="nav-right">
      <div class="nav-socials">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
      </div>
      <a href="#" class="nav-cta">Əlaqə</a>
    </div>
  </nav>
  <div class="container">
    <header>
      <h1 class="text-[50px]">Where Taste Meets Tradition</h1>
      <p class="text-[20px]">Hər qədəh, onillərlə nəfəs alan bir zamanın ifadəsidir.</p>
  </div>
  </header>
  <section class="cards">
  </section>

  <footer class="mt-[200px]  flex justify-center gap-[20px] pb-[50px] text-[black] font-bold text-[30px]">
    <button
      class="w-[50px] h-[50px] bg-[white] rounded-[40px] flex justify-center items-center cursor-pointer">1</button>
    <button
      class="w-[50px] h-[50px] bg-[white] rounded-[40px] flex justify-center items-center cursor-pointer">2</button>
    <button
      class="w-[50px] h-[50px] bg-[white] rounded-[40px] flex justify-center items-center cursor-pointer">3</button>
    <button
      class="w-[50px] h-[50px] bg-[white] rounded-[40px] flex justify-center items-center cursor-pointer">4</button>
    <button
      class="w-[50px] h-[50px] bg-[white] rounded-[40px] flex justify-center items-center cursor-pointer">5</button>
  </footer>
  </div>
  <section id="quickbasket"
    class="fixed inset-0 z-[200] hidden flex justify-end overflow-hidden bg-[#080301]/70 backdrop-blur-md">
    <div id="card-list"
      class="h-dvh w-[92vw] max-w-[380px] sm:w-full sm:max-w-[430px] border-l border-[#c9a84c59] bg-gradient-to-b from-[#2a1207] to-[#1a0a03] p-5 sm:p-6 text-[#f7efe2] shadow-[-16px_0_40px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden">
      <div class="mb-[18px] flex items-center justify-between border-b border-[#c9a84c40] pb-[14px]">
        <h1 class="text-[28px] sm:text-[34px] leading-none tracking-[1px] text-[#f8d98b] not-italic">Quick Basket</h1>
        <button
          id="basketclose" class="quickbasket-close h-9 w-9 rounded-full border border-[#c9a84c73] bg-transparent text-[20px] leading-none text-[#f8d98b] cursor-pointer"
          aria-label="Səbəti bağla">&times;</button>
      </div>

      <ul class="m-0 min-h-0 min-w-0 flex flex-1 list-none flex-col gap-3 overflow-y-auto overflow-x-hidden p-0">
        <li
          class="min-w-0 flex items-start gap-2.5 sm:gap-3 rounded-2xl border border-[#c9a84c2e] bg-white/5 p-[10px] sm:p-3">
          <img
            class="quickbasket-image h-[36px] w-[36px] shrink-0 sm:h-[44px] sm:w-[44px] rounded-lg sm:rounded-xl object-cover"
            src="https://goldbelly.imgix.net/uploads/product_image/image/42820/evan-williams-gourmet-mint-julep-mix-2-pack.a0bd561099dd14bfb33e3363c1c025d0.jpg?ixlib=react-9.0.2&auto=format&ar=1%3A1"
            alt="Product image">
          <div class="min-w-0 flex-1">
            <h4 class="m-0 mb-1 text-[15px] sm:text-[17px] text-[#f6e9cf] not-italic leading-snug break-words">Evan
              Williams Gourmet Mint Julep Mix - 2 Pack</h4>
            <p class="m-0 text-[14px] sm:text-[16px] text-[#f8d98b] not-italic">$10.00</p>
            <div class="mt-2 flex items-center gap-1.5 sm:gap-2">
              <button
                class="h-6 w-6 sm:h-7 sm:w-7 rounded-lg border border-[#c9a84c73] bg-white/[0.03] text-[16px] sm:text-[18px] leading-none text-[#f7efe2] cursor-pointer">&minus;</button>
              <button
                class="h-6 min-w-6 px-1 sm:h-7 sm:min-w-7 rounded-lg border border-[#c9a84c73] bg-white/[0.03] text-[14px] sm:text-[16px] leading-none text-[#f7efe2]">1</button>
              <button
                class="h-6 w-6 sm:h-7 sm:w-7 rounded-lg border border-[#c9a84c73] bg-white/[0.03] text-[16px] sm:text-[18px] leading-none text-[#f7efe2] cursor-pointer">&plus;</button>
            </div>
          </div>
        </li>
      </ul>

      <div
        class="mt-[18px] flex items-center justify-between border-t border-[#c9a84c40] pt-[14px] text-[18px] sm:text-[22px] text-[#f8d98b] not-italic">
        <span>Subtotal</span>
        <strong>$10.00</strong>
      </div>

      <div class="mt-[14px] flex gap-[10px]">
        <button
          class="flex-1 rounded-xl border border-[#c9a84c4d] bg-white/10 p-3 font-bold text-[#f7efe2] not-italic cursor-pointer">View
          Cart</button>
        <button
          class="flex-1 rounded-xl bg-[linear-gradient(135deg,#f5d780_0%,#c9a84c_55%,#a67922_100%)] p-3 font-bold text-[#2b1100] not-italic cursor-pointer">Checkout</button>
      </div>
    </div>
  </section>
</body>


</html>
